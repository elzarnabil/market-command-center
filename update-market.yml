name: 📊 Actualizar Datos de Mercado

on:
  schedule:
    - cron: "0,30 7-22 * * 1-5"
    - cron: "0 8,20 * * 0,6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Obtener datos de mercado
        run: python scripts/fetch_data.py

      - name: Commit datos en main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          git diff --cached --quiet || (git commit -m "📊 Datos mercado: $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,scripts,*.py,*.tar.gz,*.yml'
